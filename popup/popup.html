<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoTest Recorder</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <h1 class="header-title">🎯 AutoTest Recorder</h1>
        <div class="header-actions">
          <select id="langSwitcher" class="lang-switcher" title="Language"></select>
          <button id="expandButton" class="btn-icon" data-i18n-title="popup.expand">⛶</button>
          <button id="selectorInspectorButton" class="btn-icon" data-i18n-title="popup.selectorInspector">🔍</button>
          <button id="settingsButton" class="btn-icon settings-btn" data-i18n-title="popup.settings">⚙️</button>
        </div>
      </div>
      <div class="header-row">
        <div class="status" id="status">
          <span class="status-indicator" id="statusIndicator"></span>
          <span id="statusText" data-i18n="popup.ready">Ready</span>
        </div>
        <div class="header-row-right">
          <a id="analyticsDashboardButton" class="btn-icon analytics-dashboard-btn hidden" href="#" target="_blank" rel="noopener" data-i18n-title="popup.analyticsDashboard">📊</a>
          <button id="helpButton" class="btn-icon" data-i18n-title="popup.help">❓</button>
        </div>
      </div>
      <div class="step-progress" id="stepProgress" style="display: none;">
        <div class="step-info">
          <span id="stepText">Step 0 of 0</span>
          <span class="step-type" id="stepType"></span>
        </div>
        <div class="step-bar">
          <div class="step-bar-fill" id="stepBarFill"></div>
        </div>
      </div>
    </header>

    <div class="controls">
      <div class="control-group control-group-recording">
        <button id="startRecording" class="btn btn-primary">
          <span class="rec-btn-icon">🔴</span><span class="rec-btn-text" data-i18n="popup.startRecording">Start recording</span>
        </button>
        <button id="stopRecording" class="btn btn-danger" disabled>
          <span class="rec-btn-icon">⏹️</span><span class="rec-btn-text" data-i18n="popup.stopRecording">Stop recording</span>
        </button>
        <button id="pausePlayback" class="btn btn-warning" style="display: none;" data-i18n-title="popup.pause">
          <span class="rec-btn-icon">⏸️</span><span class="rec-btn-text" data-i18n="popup.pause">Pause</span>
        </button>
        <button id="resumePlayback" class="btn btn-success" style="display: none;" data-i18n-title="popup.resume">
          <span class="rec-btn-icon">▶️</span><span class="rec-btn-text" data-i18n="popup.resume">Resume</span>
        </button>
        <button id="forceStop" class="btn btn-gray" disabled>
          <span class="rec-btn-icon">⏹️</span><span class="rec-btn-text" data-i18n="popup.stop">Stop</span>
        </button>
      </div>

      <div class="control-group hidden" id="testNameGroup" aria-hidden="true">
        <input type="text" id="testName" data-i18n-placeholder="popup.testNamePlaceholder" placeholder="Test name..." class="input">
      </div>

      <div class="control-group hidden" id="advancedSelectorSearchGroup" aria-hidden="true">
        <button id="advancedSelectorSearch" class="btn btn-info" style="width: 100%;" data-i18n="popup.advancedSelectorSearch">
          🔍 Advanced selector search
        </button>
      </div>
    </div>

    <div class="tests-section">
      <div class="section-header">
        <div class="section-header-left">
          <h2 data-i18n="popup.testsSection">📋 Tests</h2>
          <button id="importTest" class="btn-icon" data-i18n-title="popup.importTest">📥</button>
          <button id="refreshTests" class="btn-icon" data-i18n-title="popup.refresh">🔄</button>
        </div>
        <div class="section-header-right">
          <div class="storage-indicator storage-indicator-inline" id="storageIndicator">
            <button type="button" class="storage-header-btn" id="storageToggle" data-i18n-title="popup.storageDetails">
              <span class="storage-icon">💾</span>
              <span class="storage-label" data-i18n="popup.storage">Storage:</span>
              <span class="storage-value" id="storageValue">--</span>
              <span class="storage-arrow">▼</span>
            </button>
            <div class="storage-bar">
              <div class="storage-bar-fill" id="storageBarFill"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="upgradeBanner" class="upgrade-banner hidden" aria-hidden="true"></div>
      <div class="tests-list-wrap">
        <div id="testsList" class="tests-list skeleton">
          <div class="skeleton-card"><div class="skeleton-line long"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div>
          <div class="skeleton-card"><div class="skeleton-line long"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div>
          <div class="skeleton-card"><div class="skeleton-line long"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div>
        </div>
        <div class="storage-details-overlay" id="storageDetails" aria-hidden="true">
          <div class="storage-breakdown">
            <div class="storage-item"><span data-i18n="popup.storageTests">📋 Tests:</span><span id="testsSize">--</span></div>
            <div class="storage-item"><span data-i18n="popup.storageHistory">📊 History:</span><span id="historySize">--</span></div>
            <div class="storage-item"><span data-i18n="popup.storageVariables">📦 Variables:</span><span id="variablesSize">--</span></div>
            <div class="storage-item"><span data-i18n="popup.storageSettings">⚙️ Settings:</span><span id="settingsSize">--</span></div>
            <div class="storage-item"><span data-i18n="popup.storageScreenshots">📸 Screenshots:</span><span id="screenshotsSize">--</span></div>
            <div class="storage-item"><span data-i18n="popup.storageFiles">📁 Files:</span><span id="filesSize">--</span></div>
          </div>
          <div class="storage-actions">
            <button id="clearHistory" class="btn btn-small btn-warning" data-i18n-title="popup.clearHistoryTitle" data-i18n="popup.clearHistory">🗑️ Clear history</button>
            <button id="clearScreenshots" class="btn btn-small btn-warning" data-i18n-title="popup.clearScreenshotsTitle" data-i18n="popup.clearScreenshots">📸 Clear screenshots</button>
            <button id="clearFiles" class="btn btn-small btn-warning" data-i18n-title="popup.clearFilesTitle" data-i18n="popup.clearFiles">📁 Clear files</button>
            <button id="clearAllData" class="btn btn-small btn-danger" data-i18n-title="popup.clearAllDataTitle" data-i18n="popup.clearAllData">⚠️ Clear all data</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="importFileInput" accept=".json" style="display: none;">

  <div id="upgradeModal" class="modal-overlay upgrade-modal hidden" aria-hidden="true">
    <div class="modal-content upgrade-modal-content">
      <div class="modal-header">
        <h3 data-i18n="popup.freeTierLimitTitle">Free tier limit reached</h3>
        <button type="button" class="modal-close" id="closeUpgradeModal" data-i18n-aria-label="common.close">×</button>
      </div>
      <div class="modal-body">
        <p id="upgradeModalMessage" data-i18n="popup.freeTierLimitMsg">You can store up to 10 tests in the free version.</p>
        <div class="upgrade-modal-actions">
          <a id="upgradeModalBtn" href="#" target="_blank" rel="noopener" class="btn btn-primary" data-i18n="popup.upgradePlan">Upgrade to paid plan</a>
          <button type="button" class="btn btn-secondary" id="closeUpgradeModalBtn" data-i18n="common.close">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../i18n/i18n.js"></script>
  <script src="../shared/utils.js"></script>
  <script src="excel-export.js"></script>
  <script src="popup.js"></script>
</body>
</html>
